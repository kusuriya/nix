# i3status-rust config — Corrupted Systems theme

# Left side blocks (before workspace switcher)
[[block]]
block = "scratchpad"
format = "$icon $count"

# Right side blocks (after workspace switcher)
[[block]]
block = "battery"
interval = 30
format = "$percentage $icon"

[[block]]
block = "net"
device = "wlp1s0"
format = "$ip"

[[block]]
block = "sound"
step = 5

[[block]]
block = "pomodoro"

[[block]]
block = "time"

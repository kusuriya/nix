# Startup services — order matters: dbus first, then applets
exec dbus-update-activation-environment --systemd --all
exec swaync
exec_always /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
exec_always blueman-applet
exec_always nm-applet
exec_always kanshi
exec_always sh -c 'pgrep -x waybar >/dev/null || exec waybar'

# ─── Session apps (launch once, assign rules route to workspaces) ───
exec vivaldi-stable --silent-debugger
exec obsidian
exec hermes-desktop
exec chromium
exec discord
exec element-desktop
exec signal-desktop

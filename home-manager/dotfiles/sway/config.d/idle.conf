# Idle management — lock, screen off, and sleep on inactivity.
# swayidle is started by sway; these timeouts only apply while sway is running.
#
# When docked (AC power + external monitors), lock and screen-off are
# skipped via idle-guard.sh. Suspend and before-sleep lock always run.

# Lock screen after 5 minutes (skipped when docked)
timeout 300 'idle-guard.sh swaylock -f -c 1e1e2e'

# Turn off screen after 10 minutes (skipped when docked)
timeout 600 'idle-guard.sh swaymsg "output * power off"' resume 'swaymsg "output * power on"'

# Sleep after 30 minutes (always runs — even docked machines should sleep)
timeout 1800 'systemctl suspend'

# Lock on lid close / before sleep (always runs)
before-sleep 'swaylock -f -c 1e1e2e'
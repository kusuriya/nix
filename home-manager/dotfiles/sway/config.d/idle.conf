# Idle management — lock, screen off, and sleep on inactivity.
# swayidle is started by sway; these timeouts only apply while sway is running.

# Lock screen after 5 minutes
timeout 300 'swaylock -f -c 1e1e2e'

# Turn off screen after 10 minutes (after lock)
timeout 600 'swaymsg "output * power off"' resume 'swaymsg "output * power on"'

# Sleep after 30 minutes on battery (laptop only — beast/desktop can adjust)
timeout 1800 'systemctl suspend'

# Lock on lid close (laptop)
before-sleep 'swaylock -f -c 1e1e2e'
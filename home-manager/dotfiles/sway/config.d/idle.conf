# Idle management — lock, screen off, and sleep on inactivity.
# swayidle is started by sway; these timeouts only apply while sway is running.
#
# When external monitors are connected (docked), all idle actions are
# skipped via idle-guard.sh. When only the internal display is active
# (undocked), lock, screen off, and suspend all run normally.

# Lid close: suspend only when no external monitors (idle-guard checks).
# Lid open: turn internal display back on.
bindswitch lid:on exec idle-guard.sh systemctl suspend
bindswitch lid:off output * dpms on

# Start swayidle with idle rules.
# 'timeout' and 'before-sleep' are swayidle subcommands, NOT sway commands,
# so they must be passed as arguments to `swayidle`, not used bare in the config.
exec swayidle -w \
  timeout 300 'idle-guard.sh swaylock -f -c 1e1e2e' \
  timeout 600 'idle-guard.sh swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
  timeout 1800 'idle-guard.sh systemctl suspend' \
  before-sleep 'swaylock -f -c 1e1e2e'